<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meadowlark</title>
    <script>
      !(()=>{var t='system';try{t=localStorage.getItem('meadowlark-theme')||'system'}catch(_e){}document.documentElement.classList.add(t==='system'?window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light':t)})()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
